<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Heaps Debug Dashboard</title>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;margin:0;padding:0;background:#0f172a;color:#e2e8f0;}
header{background:#111827;color:#f9fafb;padding:12px 16px;font-size:18px;font-weight:600;border-bottom:1px solid #1f2937;}
section{padding:12px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
button{background:#2563eb;border:none;color:#fff;padding:8px 12px;border-radius:6px;cursor:pointer;}
button:hover{background:#1d4ed8;}
label{display:flex;align-items:center;gap:6px;color:#cbd5e1;}
#status{color:#93c5fd;}


#tree{background:#0b1220;border-top:1px solid #1f2937;margin:0;padding:8px 12px 24px;overflow:auto;max-height:70vh;}
.node{display:block;line-height:1.4;}
.node-row{display:flex;align-items:center;gap:6px;padding:2px 0;}
.caret{width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;color:#93c5fd;background:transparent;border:1px solid transparent;cursor:pointer;font-size:10px;user-select:none;}
.caret:hover{border-color:#1f2937;background:#0f172a;}
.caret.empty{opacity:.25;cursor:default;}
.label{cursor:pointer;color:#e5e7eb;}
.label:hover{text-decoration:underline;}
.children{margin-left:16px;border-left:1px dashed #1f2937;padding-left:10px;}
.collapsed>.children{display:none;}


#modal,#addChildModal{position:fixed;inset:0;background:rgba(2,6,23,.7);display:none;align-items:center;justify-content:center;padding:24px;}
#modal .dialog,#addChildModal .dialog{background:#0b1220;border:1px solid #1f2937;border-radius:8px;max-width:640px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.4);}
#modal header,#addChildModal header{display:flex;align-items:center;justify-content:space-between;background:#0b1220;border-bottom:1px solid #1f2937;padding:10px 14px;font-size:14px;}
#modal .content,#addChildModal .content{padding:12px 14px;}
#modal pre,#addChildModal pre{margin:0;background:transparent;color:#cbd5e1;max-height:60vh;overflow:auto;}
#modal .close,#addChildModal .close{background:#334155;color:#e5e7eb;border:1px solid #475569;border-radius:6px;padding:4px 8px;cursor:pointer;}
#modal .close:hover,#addChildModal .close:hover{background:#1f2937;}

#modal .field-row,#addChildModal .field-row{display:flex;align-items:center;gap:8px;margin:6px 0;}
#modal .field-row label,#addChildModal .field-row label{min-width:72px;color:#cbd5e1;}
#modal .field-row input[type="number"],#addChildModal .field-row input[type="number"],#addChildModal .field-row select{background:#0f172a;border:1px solid #334155;color:#e5e7eb;border-radius:6px;padding:4px 6px;width:110px;}
#modal .field-row input[type="checkbox"],#addChildModal .field-row input[type="checkbox"]{transform:scale(1.1);}
#modal .apply,#addChildModal .apply{background:#2563eb;color:#fff;border:1px solid #1d4ed8;border-radius:6px;padding:4px 8px;cursor:pointer;}
#modal .apply:hover,#addChildModal .apply:hover{background:#1d4ed8;}
.hint{color:#94a3b8;font-size:12px;}
.tab-bar{display:flex;gap:4px;padding:8px 16px;background:#111827;border-bottom:1px solid #1f2937;overflow-x:auto;}
.tab-btn{background:#1f2937;color:#9ca3af;padding:6px 12px;border:1px solid #374151;border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;}
.tab-btn:hover{background:#374151;color:#e5e7eb;}
.tab-btn.active{background:#0f172a;color:#f9fafb;border-color:#1f2937;}
#disconnectedOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: #ef4444;
  backdrop-filter: grayscale(100%);
}
</style>
</head>
<body>
<div id="disconnectedOverlay">
  <div style="font-size: 24px; font-weight: bold; margin-bottom: 8px;">Connection Lost</div>
  <div>The hosting app appears to be closed.</div>
</div>
<header>Heaps Debug Dashboard</header>
<div class="tab-bar">
  <button class="tab-btn active" data-target="tab-scene2d">Scene 2D</button>
  <!-- INJECT_TAB_HEADERS -->
</div>
<div class="tab-container">
  <div id="tab-scene2d" class="tab-pane active" style="display:block;">
<section>
<button id="refresh">Fetch /scene/dom2d</button>
<label><input type="checkbox" id="auto"/> Auto-refresh</label>
<span id="status"></span>
</section>
<div id="tree"></div>
  </div>
  <!-- INJECT_TAB_CONTENTS -->
</div>
<div id="modal">
  <div class="dialog">
    <header>
      <div>Node properties</div>
      <button class="close" id="modalClose">Close</button>
    </header>
    <div class="content">
      <div id="modalBody"></div>
    </div>
  </div>
  
  
  
  
  
</div>
<div id="addChildModal">
  <div class="dialog">
    <header>
      <div>Add child node</div>
      <button class="close" id="addChildClose">Close</button>
    </header>
    <div class="content">
      <div id="addChildBody"></div>
    </div>
  </div>
</div>
<script>
const treeEl = document.getElementById('tree');
const statusEl = document.getElementById('status');
const btn = document.getElementById('refresh');
const auto = document.getElementById('auto');
let timer = null;
let manualEditPollTimer = null;
let fieldInputs = {};

const modal = document.getElementById('modal');
const modalBody = document.getElementById('modalBody');
const modalClose = document.getElementById('modalClose');
const addChildModal = document.getElementById('addChildModal');
const addChildBody = document.getElementById('addChildBody');
const addChildClose = document.getElementById('addChildClose');

let addChildDraft = null;

function uint8ToBase64(data){
  let binary = '';
  const chunkSize = 0x8000;
  for (let i = 0; i < data.length; i += chunkSize) {
    const chunk = data.subarray(i, i + chunkSize);
    binary += String.fromCharCode.apply(null, chunk);
  }
  return btoa(binary);
}

function readImageAsRgba(file){
  return new Promise((resolve, reject) => {
    const objectUrl = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const width = img.naturalWidth || img.width;
      const height = img.naturalHeight || img.height;
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const imageData = ctx.getImageData(0, 0, width, height);
      URL.revokeObjectURL(objectUrl);
      resolve({
        fileName: file.name,
        width,
        height,
        pixelsBase64: uint8ToBase64(imageData.data)
      });
    };
    img.onerror = () => {
      URL.revokeObjectURL(objectUrl);
      reject(new Error('Failed to decode image'));
    };
    img.src = objectUrl;
  });
}

function hideAddChildModal(){
  addChildModal.style.display = 'none';
  addChildDraft = null;
  addChildBody.innerHTML = '';
}

function showAddChildModal(node){
  if (!node || !node.id) return;
  addChildDraft = {
    parentId: String(node.id),
    parentType: String(node.type || 'Object'),
    kind: 'Bitmap',
    bitmap: null
  };
  renderAddChildModal();
  addChildModal.style.display = 'flex';
}

function renderAddChildModal(){
  if (!addChildDraft) return;

  const wrap = document.createElement('div');

  const parentInfo = document.createElement('div');
  parentInfo.textContent = `Parent: ${addChildDraft.parentType} — ${addChildDraft.parentId}`;
  parentInfo.style.marginBottom = '10px';
  parentInfo.style.color = '#93c5fd';
  wrap.appendChild(parentInfo);

  const kindRow = document.createElement('div');
  kindRow.className = 'field-row';
  const kindLabel = document.createElement('label');
  kindLabel.textContent = 'Kind';
  const kindSelect = document.createElement('select');
  const bitmapOpt = document.createElement('option');
  bitmapOpt.value = 'Bitmap';
  bitmapOpt.textContent = 'Bitmap';
  kindSelect.appendChild(bitmapOpt);
  kindSelect.value = addChildDraft.kind;
  kindSelect.addEventListener('change', () => {
    addChildDraft.kind = kindSelect.value;
    addChildDraft.bitmap = null;
    renderAddChildModal();
  });
  kindRow.appendChild(kindLabel);
  kindRow.appendChild(kindSelect);
  wrap.appendChild(kindRow);

  if (addChildDraft.kind === 'Bitmap') {
    const bitmapRow = document.createElement('div');
    bitmapRow.className = 'field-row';
    const bitmapLabel = document.createElement('label');
    bitmapLabel.textContent = 'Image';

    const uploadBtn = document.createElement('button');
    uploadBtn.className = 'apply';
    uploadBtn.textContent = 'Upload Image';

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    fileInput.addEventListener('change', () => {
      if (!fileInput.files || fileInput.files.length === 0) return;
      const selectedFile = fileInput.files[0];
      readImageAsRgba(selectedFile).then((bitmapData) => {
        addChildDraft.bitmap = bitmapData;
        renderAddChildModal();
      });
    });
    uploadBtn.addEventListener('click', () => {
      fileInput.click();
    });

    bitmapRow.appendChild(bitmapLabel);
    bitmapRow.appendChild(uploadBtn);
    bitmapRow.appendChild(fileInput);
    wrap.appendChild(bitmapRow);

    const bitmapHint = document.createElement('div');
    bitmapHint.className = 'hint';
    bitmapHint.style.marginBottom = '10px';
    if (addChildDraft.bitmap) {
      bitmapHint.textContent = `${addChildDraft.bitmap.fileName} (${addChildDraft.bitmap.width}x${addChildDraft.bitmap.height})`;
    } else {
      bitmapHint.textContent = 'Upload an image to create the bitmap child.';
    }
    wrap.appendChild(bitmapHint);
  }

  const actionRow = document.createElement('div');
  actionRow.className = 'field-row';
  actionRow.style.marginTop = '12px';
  const createBtn = document.createElement('button');
  createBtn.className = 'apply';
  createBtn.textContent = 'Create Child';
  createBtn.disabled = addChildDraft.kind === 'Bitmap' && !addChildDraft.bitmap;
  createBtn.addEventListener('click', () => {
    const payload = {
      parentId: addChildDraft.parentId,
      kind: addChildDraft.kind
    };
    if (addChildDraft.kind === 'Bitmap') {
      payload.bitmap = {
        width: addChildDraft.bitmap.width,
        height: addChildDraft.bitmap.height,
        pixelsBase64: addChildDraft.bitmap.pixelsBase64
      };
    }
    fetch('/node/addchild', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json;charset=utf-8' },
      body: JSON.stringify(payload)
    }).then((response) => {
      if (!response.ok) throw new Error('Failed to create child node');
      hideAddChildModal();
      setTimeout(fetchDom, 50);
    });
  });

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'apply';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', hideAddChildModal);

  actionRow.appendChild(createBtn);
  actionRow.appendChild(cancelBtn);
  wrap.appendChild(actionRow);

  addChildBody.innerHTML = '';
  addChildBody.appendChild(wrap);
}

function showModalForNode(node){
  const {children, ...props} = node;
  fieldInputs = {};

  const wrap = document.createElement('div');

  const h = document.createElement('div');
  h.textContent = `${props.type || 'Object'} — ${props.id || ''}`;
  h.style.marginBottom = '8px';
  h.style.color = '#93c5fd';
  wrap.appendChild(h);

  const actions = document.createElement('div');
  actions.style.display = 'flex';
  actions.style.gap = '8px';
  actions.style.marginBottom = '8px';

  const highlightBtn = document.createElement('button');
  highlightBtn.className = 'apply';
  highlightBtn.textContent = 'Highlight';
  highlightBtn.disabled = !props.id;
  highlightBtn.addEventListener('click', () => {
    if (!props.id) return;
    fetch('/highlightobject', { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: String(props.id) });
  });

  const clearBtn = document.createElement('button');
  clearBtn.className = 'apply';
  clearBtn.textContent = 'Clear highlight';
  clearBtn.addEventListener('click', () => {
    fetch('/highlight/clear', { method: 'POST' });
  });

  const addChildBtn = document.createElement('button');
  addChildBtn.className = 'apply';
  addChildBtn.textContent = 'Add Child Node';
  addChildBtn.disabled = !props.id;
  addChildBtn.addEventListener('click', () => {
    if (!props.id) return;
    showAddChildModal(props);
  });

  const exportTransformBtn = document.createElement('button');
  exportTransformBtn.className = 'apply';
  exportTransformBtn.textContent = 'Export transform';
  exportTransformBtn.disabled = !props.id;
  exportTransformBtn.addEventListener('click', () => {
    if (!props.id) return;
    const transformData = {
      x: props.x || 0,
      y: props.y || 0,
      scaleX: props.sx !== undefined ? props.sx : 1,
      scaleY: props.sy !== undefined ? props.sy : 1,
      rotation: props.rotation || 0
    };
    const blob = new Blob([JSON.stringify(transformData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (props.id || 'transform') + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  actions.appendChild(highlightBtn);
  actions.appendChild(clearBtn);
  actions.appendChild(addChildBtn);
  actions.appendChild(exportTransformBtn);
  wrap.appendChild(actions);

  const fieldMap = { sx: 'scaleX', sy: 'scaleY' };

  function numberField(label, field){
    const row = document.createElement('div');
    row.className = 'field-row';
    const lab = document.createElement('label');
    lab.textContent = label;
    const input = document.createElement('input');
    input.type = 'number';
    input.step = '0.1';
    input.value = typeof props[field] === 'number' ? props[field] : 0;
    fieldInputs[field] = input;
    const btn = document.createElement('button');
    btn.className = 'apply';
    btn.textContent = 'Apply';
    const send = () => {
      const v = parseFloat(input.value);
      if (!isFinite(v)) return;
      const sendField = fieldMap[field] || field;
      if (window.HDS && typeof window.HDS.updateObjectField === 'function') {
        window.HDS.updateObjectField(props.id, sendField, v);
      }
      setTimeout(fetchDom, 50);
    };
    btn.addEventListener('click', send);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    row.appendChild(lab);
    row.appendChild(input);
    row.appendChild(btn);
    return row;
  }

  function boolField(label, field){
    const row = document.createElement('div');
    row.className = 'field-row';
    const lab = document.createElement('label');
    lab.textContent = label;
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = !!props[field];
    input.addEventListener('change', () => {
      if (window.HDS && typeof window.HDS.updateObjectField === 'function') {
        window.HDS.updateObjectField(props.id, field, input.checked);
      }
      setTimeout(fetchDom, 50);
    });
    row.appendChild(lab);
    row.appendChild(input);
    return row;
  }

  wrap.appendChild(numberField('x', 'x'));
  wrap.appendChild(numberField('y', 'y'));
  wrap.appendChild(numberField('scaleX', 'sx'));
  wrap.appendChild(numberField('scaleY', 'sy'));
  wrap.appendChild(numberField('rotation', 'rotation'));
  wrap.appendChild(numberField('alpha', 'alpha'));
  wrap.appendChild(boolField('visible', 'visible'));

  const meRow = document.createElement('div');
  meRow.className = 'field-row';
  meRow.style.marginTop = '6px';
  const meLabel = document.createElement('label');
  meLabel.textContent = 'Manual Edit';
  const meCheck = document.createElement('input');
  meCheck.type = 'checkbox';
  meCheck.disabled = !props.id;
  meCheck.addEventListener('change', () => {
    if (meCheck.checked) {
      fetch('/manualedit', { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: String(props.id) });
      startManualEditPoll();
    } else {
      fetch('/manualedit', { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: '' });
      stopManualEditPoll();
    }
  });
  meRow.appendChild(meLabel);
  meRow.appendChild(meCheck);
  wrap.appendChild(meRow);

  const pre = document.createElement('pre');
  pre.textContent = JSON.stringify(props, null, 2);
  pre.style.marginTop = '12px';
  wrap.appendChild(pre);

  modalBody.innerHTML = '';
  modalBody.appendChild(wrap);
  modal.style.display = 'flex';
}

function startManualEditPoll(){
  stopManualEditPoll();
  manualEditPollTimer = setInterval(() => {
    fetch('/manualedit/transform').then(r => r.json()).then(d => {
      if (!d.active) return;
      const keys = ['x','y','sx','sy','rotation'];
      for (const k of keys) {
        const inp = fieldInputs[k];
        if (inp && document.activeElement !== inp && d[k] !== undefined) {
          inp.value = Math.round(d[k] * 100) / 100;
        }
      }
    });
  }, 200);
}

function stopManualEditPoll(){
  if (manualEditPollTimer != null) {
    clearInterval(manualEditPollTimer);
    manualEditPollTimer = null;
  }
}

function hideModal(){
  hideAddChildModal();
  modal.style.display = 'none';
  stopManualEditPoll();
  fetch('/manualedit', { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: '' });
}
modal.addEventListener('click', (e) => {
  if (e.target === modal) hideModal();
});
modalClose.addEventListener('click', hideModal);
addChildModal.addEventListener('click', (e) => {
  if (e.target === addChildModal) hideAddChildModal();
});
addChildClose.addEventListener('click', hideAddChildModal);

function buildNode(node){
  const hasChildren = Array.isArray(node.children) && node.children.length > 0;

  const nodeEl = document.createElement('div');
  nodeEl.className = 'node' + (hasChildren ? '' : ' leaf');

  const row = document.createElement('div');
  row.className = 'node-row';

  const caret = document.createElement('span');
  caret.className = 'caret' + (hasChildren ? '' : ' empty');
  caret.textContent = hasChildren ? '▸' : '·';
  if (hasChildren){
    caret.addEventListener('click', () => {
      const collapsed = nodeEl.classList.toggle('collapsed');
      caret.textContent = collapsed ? '▸' : '▾';
    });
  }

  const label = document.createElement('span');
  label.className = 'label';
  const name = node.type || 'Object';
  label.textContent = name;
  label.addEventListener('click', () => showModalForNode(node));

  row.appendChild(caret);
  row.appendChild(label);
  nodeEl.appendChild(row);

  const childrenWrap = document.createElement('div');
  childrenWrap.className = 'children';
  if (hasChildren){
    for (const child of node.children){
      childrenWrap.appendChild(buildNode(child));
    }
  }
  nodeEl.appendChild(childrenWrap);

  
  if (hasChildren){
    nodeEl.classList.remove('collapsed');
    caret.textContent = '▾';
  }

  return nodeEl;
}

function renderTree(data){
  treeEl.innerHTML = '';
  treeEl.appendChild(buildNode(data));
}

function fetchDom(){
  statusEl.textContent = 'Loading...';
  fetch('/scene/dom2d').then(r => r.json()).then(d => {
    renderTree(d);
    statusEl.textContent = 'OK';
  });
}
btn.addEventListener('click', fetchDom);
auto.addEventListener('change', () => {
  if (auto.checked) { timer = setInterval(fetchDom, 1000); fetchDom(); }
  else { clearInterval(timer); timer = null; }
});
window.addEventListener('load', fetchDom);

// Tab Switching Logic
document.querySelector('.tab-bar').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  
  // Hide all tab panes
  document.querySelectorAll('.tab-pane').forEach(pane => {
    pane.style.display = 'none';
    pane.classList.remove('active');
  });
  // Deselect all buttons
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  
  // Show the target tab
  const targetId = btn.getAttribute('data-target');
  const targetPane = document.getElementById(targetId);
  if (targetPane) {
    targetPane.style.display = 'block';
    targetPane.classList.add('active');
  }
  btn.classList.add('active');
});

let isDisconnected = false;
const disconnectedOverlayEl = document.getElementById('disconnectedOverlay');
function updateConnectionStatus(offline) {
  if (isDisconnected === offline) return;
  isDisconnected = offline;
  disconnectedOverlayEl.style.display = offline ? 'flex' : 'none';
}
setInterval(() => {
  fetch('/', { method: 'HEAD' })
    .then(() => updateConnectionStatus(false))
    .catch(() => updateConnectionStatus(true));
}, 2000);

</script>
</body>
</html>
